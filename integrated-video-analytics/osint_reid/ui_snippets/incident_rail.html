<section id="incidentRail" aria-live="polite">
  <h3>Identity Incidents</h3>
  <ul id="incidentList"></ul>
</section>
<script>
(function () {
  const list = document.getElementById("incidentList");
  const ws = new WebSocket(`${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws/state`);
  ws.onmessage = (event) => {
    const payload = JSON.parse(event.data);
    if (payload.type !== "identity_incident") return;
    const li = document.createElement("li");
    li.textContent = `${payload.created_at} | ${payload.tracklet_id} | score=${payload.score}`;
    list.prepend(li);
  };
})();
</script>
